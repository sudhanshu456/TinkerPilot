name: Build and Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and build frontend
        run: |
          cd frontend
          npm install
          npm run build
        
      - name: Build Python Wheel and Package Release
        run: |
          # Copy compiled frontend into backend module for the pip package
          mkdir -p backend/app/static/ui
          cp -r frontend/out/* backend/app/static/ui/

          # Build the .whl using standard python tools
          cd backend
          pip install build
          python -m build --wheel
          # Rename to a valid wheel filename (Matches pyproject.toml version)
          mv dist/*.whl ../tinkerpilot-0.1.0-py3-none-any.whl

      - name: Upload Python Wheel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./tinkerpilot-0.1.0-py3-none-any.whl
          asset_name: tinkerpilot-0.1.0-py3-none-any.whl
          asset_content_type: application/zip
