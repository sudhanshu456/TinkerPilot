name: Build and Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and build frontend
        run: |
          cd frontend
          npm install
          npm run build
        
      - name: Build Python Wheel and Package Release
        run: |
          # Strip the leading 'v' from the tag to get a PEP-440 version (e.g. v0.2.1 -> 0.2.1)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"

          # Patch pyproject.toml to use the release version
          sed -i "s/^version = .*/version = \"$VERSION\"/" backend/pyproject.toml

          # Copy compiled frontend into backend module for the pip package
          mkdir -p backend/app/static/ui
          cp -r frontend/out/* backend/app/static/ui/

          # Build the .whl
          cd backend
          pip install build
          python -m build --wheel
          
          # The wheel will be named: tinkerpilot-{VERSION}-py3-none-any.whl
          WHL_FILE=$(ls dist/*.whl)
          echo "Built wheel: $WHL_FILE"
          cp "$WHL_FILE" ../tinkerpilot-release.whl

      - name: Upload Python Wheel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./tinkerpilot-release.whl
          asset_name: tinkerpilot-${{ github.ref_name }}-py3-none-any.whl
          asset_content_type: application/zip
